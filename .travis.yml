language: java
os: linux
dist: focal
jobs:
  include:
    - name: "JDK 8, Scala 2.11, Spark 2"
      jdk: openjdk8
      env: SCALA_PROFILE='scala-2.11' SPAKR_PROFILE='spark2'
    - name: "JDK 8, Scala 2.12, Spark 3"
      jdk: openjdk8
      env: SCALA_PROFILE='scala-2.12' SPAKR_PROFILE='spark3'
install: skip
script:
  - mvn install -P "$SCALA_PROFILE,$SPAKR_PROFILE" -DskipTests=true -Dmaven.javadoc.skip=true -B -V
